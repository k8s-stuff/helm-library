name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  pages: write

env:
  CHART_NAME: helm-library
  CHART_PATH: charts/helm-library

jobs:
  release-oci:
    name: Push to GHCR (OCI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: helm package "$CHART_PATH" --version "${{ steps.version.outputs.version }}"

      - name: Push chart to GHCR
        run: helm push "$CHART_NAME-${{ steps.version.outputs.version }}.tgz" "oci://ghcr.io/${{ github.repository_owner }}"

  release-pages:
    name: Release via chart-releaser (GitHub Pages)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
